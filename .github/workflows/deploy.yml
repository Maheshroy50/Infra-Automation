name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            if [ ! -d /var/www/flask-react-app/.git ]; then
              echo "Expected git repo at /var/www/flask-react-app. Provision the server with Terraform first."
              exit 1
            fi

            cd /var/www/flask-react-app
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main
            chmod +x deploy.sh
            ./deploy.sh
